<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHARACTER ARCHIVE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root {
  --accent: #78addd;
  --accent-bg: #e8f2fb;
  --bg: #F0EEE9;
  --surface: #FAFAF8;
  --surface2: #F2F0EB;
  --text: #1C1C1A;
  --text-2: #666;
  --text-3: #999;
  --border: rgba(0,0,0,0.09);
  --radius: 12px;
  --card-w: 220px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── 화면 전환 ── */
.page { display: none; }
.page.active { display: block; }

/* ── 공통 버튼 ── */
.btn {
  height: 36px; padding: 0 16px;
  border: 1px solid var(--border); border-radius: 8px;
  background: var(--surface); color: var(--text);
  font-size: 13px; font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
  transition: background 0.15s; white-space: nowrap;
}
.btn:hover { background: var(--surface2); }
.btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn.primary:hover { opacity: 0.88; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* ── 설정바 ── */
.settings-bar {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 2.5rem; background: var(--surface);
  border-bottom: 1px solid var(--border); flex-wrap: wrap;
}
.settings-bar label { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-3); }
.settings-bar input[type=color] { width: 30px; height: 30px; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; padding: 2px; background: none; }
.settings-bar input[type=text] { width: 76px; height: 30px; border: 1px solid var(--border); border-radius: 6px; font-family: 'DM Mono', monospace; font-size: 11px; padding: 0 8px; background: var(--bg); color: var(--text); }
.sep { width: 1px; height: 20px; background: var(--border); }
.editable { border: none; background: transparent; font-family: inherit; font-size: inherit; font-weight: inherit; color: inherit; letter-spacing: inherit; outline: none; width: 100%; cursor: text; }
.editable:focus { border-bottom: 1px solid var(--accent); }

/* ════════════════════════════
   LIST PAGE
════════════════════════════ */
.list-header {
  padding: 2.5rem 2.5rem 2rem;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 1rem; flex-wrap: wrap; background: var(--surface);
}
.scenario-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.16em; color: var(--text-3); margin-bottom: 6px; }
.scenario-title-wrap { font-size: 11px; color: var(--text-2); font-family: 'DM Mono', monospace; letter-spacing: 0.04em; margin-bottom: 14px; }
.party-heading { font-size: 30px; font-weight: 700; letter-spacing: -0.02em; line-height: 1; }
.party-heading span { color: var(--accent); }
.header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.member-count { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-3); padding: 0 4px; }

.list-main { padding: 2rem 2.5rem; }
.card-grid { display: flex; flex-wrap: wrap; gap: 18px; align-items: flex-start; }

/* ── 캐릭터 카드 ── */
.char-card {
  width: var(--card-w); background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius);
  overflow: hidden; position: relative; cursor: pointer;
  transition: transform 0.18s, border-color 0.18s;
}
.char-card:hover { transform: translateY(-3px); border-color: var(--accent); }
.card-img { width: 100%; height: 260px; background: var(--surface2); position: relative; overflow: hidden; }
.card-img img { width: 100%; height: 100%; object-fit: cover; object-position: top center; pointer-events: none; }
.card-img-placeholder { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; pointer-events: none; }
.card-img-placeholder svg { opacity: 0.22; }
.card-img-placeholder span { font-size: 11px; color: var(--text-3); font-family: 'DM Mono', monospace; }
.img-upload-btn { position: absolute; bottom: 8px; right: 8px; background: rgba(255,255,255,0.88); border: none; border-radius: 6px; font-size: 11px; padding: 4px 9px; cursor: pointer; color: var(--text); font-family: 'DM Mono', monospace; display: none; z-index: 2; }
.char-card:hover .img-upload-btn { display: block; }
.card-delete { position: absolute; top: 8px; right: 8px; width: 26px; height: 26px; border-radius: 50%; background: rgba(255,255,255,0.92); border: 1px solid var(--border); font-size: 13px; cursor: pointer; display: none; align-items: center; justify-content: center; color: var(--text-2); transition: background 0.15s; z-index: 4; }
.char-card:hover .card-delete { display: flex; }
.card-delete:hover { background: #fee2e2; color: #dc2626; }
.card-body { padding: 12px 14px 14px; }
.card-name { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 2px; }
.card-meta { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-3); letter-spacing: 0.04em; margin-bottom: 12px; }
.stat-section-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.14em; color: var(--text-3); margin-bottom: 7px; display: flex; align-items: center; gap: 6px; }
.stat-section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.stat-row { display: flex; align-items: center; gap: 7px; margin-bottom: 4px; }
.st-name { font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; color: var(--text-2); width: 32px; flex-shrink: 0; }
.st-track { flex: 1; height: 4px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
.st-fill { height: 100%; border-radius: 99px; background: var(--accent); transition: width 0.4s; }
.st-val { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-3); width: 28px; text-align: right; flex-shrink: 0; }

/* ── 추가 카드 ── */
.add-card { width: var(--card-w); min-height: 340px; border: 1.5px dashed rgba(0,0,0,0.14); border-radius: var(--radius); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; cursor: pointer; transition: border-color 0.15s, background 0.15s; color: var(--text-3); padding: 24px; }
.add-card:hover { border-color: var(--accent); background: var(--accent-bg); color: var(--accent); }
.add-card span { font-size: 12px; font-family: 'DM Mono', monospace; letter-spacing: 0.06em; text-align: center; line-height: 1.6; }

/* ════════════════════════════
   DETAIL PAGE
════════════════════════════ */
.detail-topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 2.5rem; background: var(--surface);
  border-bottom: 1px solid var(--border); gap: 12px; flex-wrap: wrap;
}
.detail-topbar-left { display: flex; align-items: center; gap: 12px; }
.back-btn {
  height: 34px; padding: 0 14px;
  border: 1px solid var(--border); border-radius: 8px;
  background: var(--surface); color: var(--text-2);
  font-size: 13px; font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
  transition: background 0.15s;
}
.back-btn:hover { background: var(--surface2); color: var(--text); }
.detail-scenario { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-3); }

#detail-page { background: var(--bg); }
.detail-body {
  max-width: 900px; margin: 0 auto;
  padding: 2.5rem 2.5rem 4rem;
  display: grid;
  grid-template-columns: 300px 1fr;
  gap: 2rem;
  align-items: start;
}

/* 왼쪽 이미지 패널 */
.detail-img-wrap {
  border-radius: var(--radius); overflow: hidden;
  background: var(--surface2);
  aspect-ratio: 3/4;
  position: relative; cursor: pointer;
  border: 1px solid var(--border);
}
.detail-img-wrap img { width: 100%; height: 100%; object-fit: cover; object-position: top center; display: block; }
.detail-img-placeholder { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
.detail-img-placeholder svg { opacity: 0.22; }
.detail-img-placeholder span { font-size: 12px; color: var(--text-3); font-family: 'DM Mono', monospace; }
.detail-img-change { position: absolute; bottom: 10px; right: 10px; background: rgba(255,255,255,0.88); border: none; border-radius: 6px; font-size: 11px; padding: 5px 10px; cursor: pointer; color: var(--text); font-family: 'DM Mono', monospace; opacity: 0; transition: opacity 0.15s; }
.detail-img-wrap:hover .detail-img-change { opacity: 1; }

/* 오른쪽 정보 패널 */
.detail-info {}
.detail-name { font-size: 30px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.1; margin-bottom: 4px; }
.detail-sub { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-3); margin-bottom: 20px; }

.detail-meta { display: flex; gap: 0; margin-bottom: 24px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.detail-meta-cell { flex: 1; padding: 8px 12px; border-right: 1px solid var(--border); }
.detail-meta-cell:last-child { border-right: none; }
.detail-meta-key { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.1em; color: var(--text-3); display: block; margin-bottom: 2px; }
.detail-meta-val { font-size: 13px; font-weight: 500; }

.detail-section { margin-bottom: 24px; }
.detail-section-label {
  font-family: 'DM Mono', monospace; font-size: 9px; font-weight: 500;
  letter-spacing: 0.18em; color: var(--text-3);
  margin-bottom: 12px; padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}

.detail-params-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px; }
.detail-param-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; }
.detail-param-label { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text-3); margin-bottom: 2px; }
.detail-param-val { font-size: 17px; font-weight: 500; }

.detail-stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 20px; }
.detail-stat-row { display: flex; align-items: center; gap: 8px; }
.dst-name { font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; color: var(--text-2); width: 32px; flex-shrink: 0; }
.dst-track { flex: 1; height: 5px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
.dst-fill { height: 100%; border-radius: 99px; background: var(--accent); transition: width 0.4s; }
.dst-val { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-3); width: 28px; text-align: right; flex-shrink: 0; }

.detail-skill-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 20px; }
.detail-skill-row { display: flex; align-items: center; gap: 7px; }
.dsk-name { font-size: 11px; color: var(--text-2); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.dsk-track { width: 60px; height: 3px; flex-shrink: 0; background: var(--surface2); border-radius: 99px; overflow: hidden; }
.dsk-fill { height: 100%; border-radius: 99px; background: var(--accent); }
.dsk-val { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-3); width: 24px; text-align: right; flex-shrink: 0; }

/* ── 모달 ── */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
.modal-bg.open { display: flex; }
.modal { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 26px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
.modal-sub { font-size: 12px; color: var(--text-3); font-family: 'DM Mono', monospace; margin-bottom: 16px; line-height: 1.6; }
.modal textarea { width: 100%; min-height: 180px; font-family: 'DM Mono', monospace; font-size: 11px; border: 1px solid var(--border); border-radius: 8px; padding: 12px; background: var(--bg); color: var(--text); resize: vertical; line-height: 1.5; }
.modal-error { display: none; margin-top: 10px; padding: 10px 12px; background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; font-size: 11px; font-family: 'DM Mono', monospace; color: #dc2626; line-height: 1.6; word-break: break-all; }
.modal-btn-row { display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end; }
.modal-btn { height: 36px; padding: 0 18px; border-radius: 8px; border: 1px solid var(--border); font-size: 13px; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; background: var(--surface); color: var(--text); transition: background 0.15s; }
.modal-btn:hover { background: var(--surface2); }
.modal-btn.ok { background: var(--accent); color: #fff; border-color: var(--accent); }
.modal-btn.ok:hover { opacity: 0.88; }

/* ── 토스트 ── */
.toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: #1c1c1a; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 13px; z-index: 999; font-family: 'Noto Sans KR', sans-serif; pointer-events: none; opacity: 0; transition: opacity 0.2s; }
.toast.show { opacity: 1; }

/* ── 페이지 전환 애니메이션 ── */
.page { animation: none; }
.page.active { animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

@media (max-width: 700px) {
  :root { --card-w: calc(50vw - 1.5rem); }
  .list-header, .list-main, .settings-bar, .detail-topbar { padding-left: 1.25rem; padding-right: 1.25rem; }
  .detail-body { grid-template-columns: 1fr; padding: 1.5rem 1.25rem 3rem; }
  .detail-img-wrap { aspect-ratio: 4/3; }
}
</style>
</head>
<body>

<!-- 설정바 (공통) -->
<div class="settings-bar">
  <label>ACCENT</label>
  <input type="color" id="color-pick" value="#78addd">
  <input type="text" id="color-hex" value="#78addd" placeholder="#hex">
</div>

<!-- ════ LIST PAGE ════ -->
<div id="list-page" class="page active">
  <header class="list-header">
    <div>
      <div class="scenario-label">ARCHIVE</div>
      <div class="scenario-title-wrap">
        <input class="editable" id="scenario-name" type="text" value="한 줄 설명을 입력하세요" maxlength="40">
      </div>
      <div class="party-heading">CHARACTER <span>ARCHIVE</span></div>
    </div>
    <div class="header-right">
      <span class="member-count" id="member-count">0명</span>
      <button class="btn" id="btn-export">JSON 내보내기</button>
      <button class="btn" id="btn-import">JSON 불러오기</button>
      <button class="btn" id="btn-capture-list">이미지 저장</button>
      <button class="btn primary" id="btn-add">+ 캐릭터 추가</button>
    </div>
  </header>
  <main class="list-main">
    <div class="card-grid" id="card-grid">
      <div class="add-card" id="add-card-btn">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
        </svg>
        <span>JSON 붙여넣기로<br>캐릭터 추가</span>
      </div>
    </div>
  </main>
</div>

<!-- ════ DETAIL PAGE ════ -->
<div id="detail-page" class="page">
  <div class="detail-topbar">
    <div class="detail-topbar-left">
      <button class="back-btn" id="back-btn">← 목록으로</button>
      <span class="detail-scenario" id="detail-scenario-label"></span>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn" id="btn-capture-detail">이미지 저장</button>
    </div>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<!-- 추가 모달 -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div class="modal-title">캐릭터 추가</div>
    <div class="modal-sub">Cocofolia에서 복사한 캐릭터 JSON을 붙여넣으세요.<br>배열 [ ] 로 감싸면 여러 명을 한 번에 추가할 수 있어요.</div>
    <textarea id="modal-json" placeholder='{"kind":"character","data":{...}}'></textarea>
    <div class="modal-error" id="modal-error"></div>
    <div class="modal-btn-row">
      <button class="modal-btn" id="modal-cancel">취소</button>
      <button class="modal-btn ok" id="modal-ok">추가</button>
    </div>
  </div>
</div>

<input type="file" id="img-input" accept="image/*" style="display:none">
<input type="file" id="file-input" accept=".json,application/json" style="display:none">
<div class="toast" id="toast"></div>

<script>
/* ── 상태 ── */
let accent = '#78addd';
let characters = [];
let pendingImgIdx = null;
let currentDetailIdx = null;

/* ── 유틸 ── */
function lighten(hex, amt) {
  hex = hex.replace('#','');
  const n=parseInt(hex,16), r=(n>>16)&255, g=(n>>8)&255, b=n&255;
  const m=v=>Math.min(255,Math.round(v+(255-v)*amt));
  return '#'+[m(r),m(g),m(b)].map(v=>v.toString(16).padStart(2,'0')).join('');
}
function applyAccent(c) {
  accent = c;
  document.documentElement.style.setProperty('--accent', c);
  document.documentElement.style.setProperty('--accent-bg', lighten(c, 0.85));
  document.querySelectorAll('.st-fill,.dst-fill,.dsk-fill').forEach(el=>el.style.background=c);
}
function parseMemo(memo) {
  const m={};
  (memo||'').split('\n').forEach(l=>{const i=l.indexOf(':');if(i>-1)m[l.slice(0,i).trim()]=l.slice(i+1).trim();});
  return m;
}
function parseSkills(cmd) {
  return (cmd||'').split('\n').map(l=>{const m=l.match(/cc<=(\d+)\s+(.+)/);return m?{name:m[2].trim(),val:parseInt(m[1])}:null;}).filter(Boolean).sort((a,b)=>b.val-a.val);
}
function parseJSON(raw) {
  const p=JSON.parse(raw.trim());
  return (Array.isArray(p)?p:[p]).map(item=>item.kind==='character'?item.data:item);
}
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

const PARAM_MAP={'근력':'STR','건강':'CON','크기':'SIZ','민첩':'DEX','외모':'APP','지능':'INT','정신':'POW','교육':'EDU'};
const EXTRA_MAP={'피해보너스':'DMG BONUS','이동력':'MOVE'};

/* ── 화면 전환 ── */
function showPage(id) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

/* ════ LIST PAGE ════ */
function makeCard(char, idx) {
  const memo=parseMemo(char.memo);
  const metaParts=[memo['직업'],memo['나이']?memo['나이']+'세':null].filter(Boolean);
  const params=(char.params||[]).filter(p=>PARAM_MAP[p.label]&&!isNaN(parseInt(p.value)));
  const statRows=params.map(p=>{
    const v=parseInt(p.value);
    return `<div class="stat-row"><div class="st-name">${PARAM_MAP[p.label]}</div><div class="st-track"><div class="st-fill" style="width:${Math.min(v,100)}%;background:${accent}"></div></div><div class="st-val">${v}</div></div>`;
  }).join('');
  const imgContent=char._img
    ?`<img src="${char._img}" alt="${char.name}">`
    :`<div class="card-img-placeholder"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span>이미지 없음</span></div>`;
  return `<div class="char-card" data-action="open" data-idx="${idx}">
    <button class="card-delete" data-action="delete" data-idx="${idx}" title="삭제">✕</button>
    <div class="card-img">
      ${imgContent}
      <button class="img-upload-btn" data-action="img" data-idx="${idx}">이미지 변경</button>
    </div>
    <div class="card-body">
      <div class="card-name">${char.name||'이름 없음'}</div>
      <div class="card-meta">${metaParts.join(' · ')||'—'}</div>
      <div class="stat-section-label">CHARACTERISTIC</div>
      ${statRows}
    </div>
  </div>`;
}

document.getElementById('card-grid').addEventListener('click', function(e) {
  const del=e.target.closest('[data-action="delete"]');
  if (del) { characters.splice(parseInt(del.dataset.idx),1); renderGrid(); return; }
  const img=e.target.closest('[data-action="img"]');
  if (img) { e.stopPropagation(); pendingImgIdx=parseInt(img.dataset.idx); document.getElementById('img-input').value=''; document.getElementById('img-input').click(); return; }
  if (e.target.closest('#add-card-btn')) { openModal(); return; }
  const card=e.target.closest('[data-action="open"]');
  if (card) openDetail(parseInt(card.dataset.idx));
});

/* ════ DETAIL PAGE ════ */
function openDetail(idx) {
  currentDetailIdx=idx;
  const char=characters[idx];
  const memo=parseMemo(char.memo);
  const skills=parseSkills(char.commands);
  const params=(char.params||[]).filter(p=>PARAM_MAP[p.label]&&!isNaN(parseInt(p.value)));
  const extras=(char.params||[]).filter(p=>EXTRA_MAP[p.label]);

  document.getElementById('detail-scenario-label').textContent=document.getElementById('scenario-name').value||'';

  // 이미지
  const imgHTML=char._img
    ?`<img src="${char._img}" alt="${char.name}"><button class="detail-img-change" data-action="detail-img">이미지 변경</button>`
    :`<div class="detail-img-placeholder"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span>클릭해서 이미지 추가</span></div><button class="detail-img-change" data-action="detail-img">이미지 추가</button>`;

  // 메타
  const metaKeys=[['나이','AGE'],['성별','SEX'],['직업','JOB'],['국적','ORIGIN']];
  const metaCells=metaKeys.filter(([k])=>memo[k]).map(([k,l])=>`<div class="detail-meta-cell" style="background:${lighten(accent,0.88)}"><span class="detail-meta-key">${l}</span><span class="detail-meta-val">${memo[k]}</span></div>`).join('');

  // 기본 파라미터
  const extraCards=extras.map(p=>`<div class="detail-param-card"><div class="detail-param-label">${EXTRA_MAP[p.label]}</div><div class="detail-param-val">${p.value}</div></div>`).join('');

  // 능력치
  const statRows=params.map(p=>{const v=parseInt(p.value);return `<div class="detail-stat-row"><div class="dst-name">${PARAM_MAP[p.label]}</div><div class="dst-track"><div class="dst-fill" style="width:${Math.min(v,100)}%;background:${accent}"></div></div><div class="dst-val">${v}</div></div>`;}).join('');

  // 스킬
  const skillRows=skills.map(s=>`<div class="detail-skill-row"><div class="dsk-name">${s.name}</div><div class="dsk-track"><div class="dsk-fill" style="width:${Math.min(s.val,100)}%;background:${accent}"></div></div><div class="dsk-val">${s.val}</div></div>`).join('');

  document.getElementById('detail-body').innerHTML=`
    <div class="detail-img-wrap" id="detail-img-wrap">${imgHTML}</div>
    <div class="detail-info">
      <div class="detail-name">${char.name||'이름 없음'}</div>
      <div class="detail-sub">${[memo['직업'],memo['나이']?memo['나이']+'세':null].filter(Boolean).join(' · ')||'—'}</div>
      ${metaCells?`<div class="detail-meta">${metaCells}</div>`:''}
      ${extraCards?`<div class="detail-section"><div class="detail-section-label">BASIC INFO</div><div class="detail-params-grid">${extraCards}</div></div>`:''}
      <div class="detail-section"><div class="detail-section-label">CHARACTERISTIC</div><div class="detail-stat-grid">${statRows}</div></div>
      ${skillRows?`<div class="detail-section"><div class="detail-section-label">ALL SKILLS</div><div class="detail-skill-grid">${skillRows}</div></div>`:''}
    </div>`;

  showPage('detail-page');
}

document.getElementById('back-btn').addEventListener('click', ()=>showPage('list-page'));

// 상세 페이지 이미지 클릭 (이벤트 위임 - 한 번만 등록)
document.getElementById('detail-page').addEventListener('click', function(e) {
  const wrap = e.target.closest('#detail-img-wrap');
  if (wrap && currentDetailIdx !== null) {
    pendingImgIdx = currentDetailIdx;
    document.getElementById('img-input').value = '';
    document.getElementById('img-input').click();
  }
});

/* ── 이미지 업로드 ── */
document.getElementById('img-input').addEventListener('change', function(e) {
  const f=e.target.files[0]; if(!f||pendingImgIdx===null) return;
  const r=new FileReader();
  r.onload=ev=>{
    characters[pendingImgIdx]._img=ev.target.result;
    renderGrid();
    if (currentDetailIdx===pendingImgIdx) openDetail(pendingImgIdx);
    pendingImgIdx=null;
  };
  r.readAsDataURL(f);
});

/* ── 이미지 캡처 공통 ── */
async function captureEl(el, filename) {
  const canvas = await html2canvas(el, {
    backgroundColor: '#F0EEE9',
    scale: 2,
    useCORS: true,
    logging: false,
    onclone: (doc, clonedEl) => {
      // object-fit:cover 이미지를 background-image로 교체해서 찌그러짐 방지
      clonedEl.querySelectorAll('img').forEach(img => {
        const orig = el.querySelector(`img[src="${img.src}"]`) || img;
        const rect = orig.getBoundingClientRect();
        const parent = img.parentElement;
        parent.style.backgroundImage = `url(${img.src})`;
        parent.style.backgroundSize = 'cover';
        parent.style.backgroundPosition = 'top center';
        parent.style.width = rect.width + 'px';
        parent.style.height = rect.height + 'px';
        img.style.display = 'none';
      });
    }
  });
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = filename;
  a.click();
}

document.getElementById('btn-capture-list').addEventListener('click', async function() {
  if (!characters.length) { showToast('캐릭터를 먼저 추가해주세요.'); return; }
  this.textContent='저장 중...'; this.disabled=true;
  try { await captureEl(document.querySelector('.list-main'), (document.getElementById('scenario-name').value||'party').replace(/\s+/g,'_')+'.png'); }
  finally { this.textContent='이미지 저장'; this.disabled=false; }
});

document.getElementById('btn-capture-detail').addEventListener('click', async function() {
  this.textContent='저장 중...'; this.disabled=true;
  try {
    const char=characters[currentDetailIdx];
    await captureEl(document.getElementById('detail-body'), (char.name||'character').replace(/\s+/g,'_')+'.png');
  } finally { this.textContent='이미지 저장'; this.disabled=false; }
});

/* ── 모달 ── */
function openModal() {
  document.getElementById('modal-bg').classList.add('open');
  document.getElementById('modal-json').value='';
  document.getElementById('modal-error').style.display='none';
  setTimeout(()=>document.getElementById('modal-json').focus(),80);
}
function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }
document.getElementById('modal-bg').addEventListener('click', function(e){ if(e.target===this) closeModal(); });
document.getElementById('modal-cancel').addEventListener('click', closeModal);
document.getElementById('modal-json').addEventListener('input', ()=>{ document.getElementById('modal-error').style.display='none'; });
document.getElementById('modal-ok').addEventListener('click', function() {
  const errEl=document.getElementById('modal-error');
  errEl.style.display='none';
  try {
    const raw=document.getElementById('modal-json').value.trim();
    if (!raw) { errEl.textContent='⚠ JSON을 입력해주세요.'; errEl.style.display='block'; return; }
    const newChars=parseJSON(raw);
    if (!newChars.length) { errEl.textContent='⚠ 캐릭터 데이터를 찾을 수 없어요.'; errEl.style.display='block'; return; }
    characters.push(...newChars);
    renderGrid(); closeModal();
  } catch(e) {
    errEl.innerHTML=`⚠ JSON 파싱 오류<br><span style="color:#999">${e.message}</span>`;
    errEl.style.display='block';
  }
});

/* ── 헤더 버튼 ── */
document.getElementById('btn-add').addEventListener('click', openModal);
document.getElementById('btn-export').addEventListener('click', exportData);
document.getElementById('btn-import').addEventListener('click', ()=>{ document.getElementById('file-input').value=''; document.getElementById('file-input').click(); });

/* ── 저장/불러오기 ── */
const STORAGE_KEY = 'coc_party_v1';
const STORAGE_META_KEY = 'coc_party_meta_v1';

// IndexedDB (이미지 저장용)
let db = null;
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('coc_party_images', 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore('images', {keyPath:'key'});
    req.onsuccess = e => { db = e.target.result; resolve(db); };
    req.onerror = reject;
  });
}
async function saveImage(key, dataUrl) {
  if (!db) await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('images', 'readwrite');
    tx.objectStore('images').put({key, dataUrl});
    tx.oncomplete = resolve; tx.onerror = reject;
  });
}
async function loadImage(key) {
  if (!db) await openDB();
  return new Promise((resolve) => {
    const tx = db.transaction('images', 'readonly');
    const req = tx.objectStore('images').get(key);
    req.onsuccess = () => resolve(req.result?.dataUrl || null);
    req.onerror = () => resolve(null);
  });
}
async function deleteImage(key) {
  if (!db) await openDB();
  return new Promise((resolve) => {
    const tx = db.transaction('images', 'readwrite');
    tx.objectStore('images').delete(key);
    tx.oncomplete = resolve; tx.onerror = resolve;
  });
}

// 저장 (characters에서 _img 분리 → IndexedDB, 나머지 → localStorage)
async function saveAll() {
  const meta = {
    scenarioName: document.getElementById('scenario-name').value,
    accent,
    updatedAt: Date.now()
  };
  const charsMeta = characters.map((c, i) => {
    const {_img, ...rest} = c;
    return {_idx: i, ...rest};
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(charsMeta));
  localStorage.setItem(STORAGE_META_KEY, JSON.stringify(meta));
  // 이미지 저장
  await Promise.all(characters.map((c, i) => {
    if (c._img) return saveImage(`char_${i}`, c._img);
    else return deleteImage(`char_${i}`);
  }));
}

// 불러오기
async function loadAll() {
  try {
    const metaRaw = localStorage.getItem(STORAGE_META_KEY);
    const charsRaw = localStorage.getItem(STORAGE_KEY);
    if (!charsRaw) return;
    const meta = metaRaw ? JSON.parse(metaRaw) : {};
    if (meta.scenarioName) document.getElementById('scenario-name').value = meta.scenarioName;
    if (meta.accent) {
      document.getElementById('color-pick').value = meta.accent;
      document.getElementById('color-hex').value = meta.accent;
      applyAccent(meta.accent);
    }
    characters = JSON.parse(charsRaw);
    // 이미지 복원
    await openDB();
    await Promise.all(characters.map(async (c, i) => {
      c._img = await loadImage(`char_${i}`);
    }));
    renderGrid();
  } catch(e) { console.warn('불러오기 실패:', e); }
}

// 자동 저장: characters가 바뀔 때마다 호출
function renderGrid() {
  const grid=document.getElementById('card-grid');
  const addBtn=document.getElementById('add-card-btn');
  grid.querySelectorAll('.char-card').forEach(el=>el.remove());
  characters.forEach((c,i)=>{
    const tmp=document.createElement('div');
    tmp.innerHTML=makeCard(c,i);
    grid.insertBefore(tmp.firstElementChild, addBtn);
  });
  document.getElementById('member-count').textContent=characters.length+'명';
  saveAll(); // 자동 저장
}

// JSON 내보내기 (이미지 포함)
function exportData() {
  const payload = {
    _type: 'coc_party',
    scenarioName: document.getElementById('scenario-name').value,
    accent,
    characters: characters.map(c => {
      const {_img, ...rest} = c;
      return {kind:'character', data:rest, _img: _img||null};
    })
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (document.getElementById('scenario-name').value||'party').replace(/\s+/g,'_') + '.json';
  a.click();
  showToast('내보내기 완료!');
}

// JSON 가져오기
document.getElementById('file-input').addEventListener('change', function(e) {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (data._type === 'coc_party') {
        // 파티 파일
        if (data.scenarioName) document.getElementById('scenario-name').value = data.scenarioName;
        if (data.accent) { document.getElementById('color-pick').value=data.accent; document.getElementById('color-hex').value=data.accent; applyAccent(data.accent); }
        characters = data.characters.map(item => {
          const char = item.kind==='character' ? item.data : item;
          char._img = item._img || null;
          return char;
        });
      } else {
        // 일반 캐릭터 JSON 배열도 허용
        const parsed = Array.isArray(data) ? data : [data];
        characters = parsed.map(item => item.kind==='character' ? item.data : item);
      }
      renderGrid();
      showToast('불러오기 완료!');
    } catch(e) { showToast('⚠ 파일을 읽을 수 없어요: ' + e.message); }
  };
  r.readAsText(f);
});

/* ── 설명 변경 시 저장 ── */
document.getElementById('scenario-name').addEventListener('change', saveAll);

/* ── 컬러 피커 ── */
document.getElementById('color-pick').addEventListener('input', function() {
  document.getElementById('color-hex').value=this.value; applyAccent(this.value); saveAll();
});
document.getElementById('color-hex').addEventListener('input', function() {
  if(/^#[0-9a-fA-F]{6}$/.test(this.value)){document.getElementById('color-pick').value=this.value;applyAccent(this.value);saveAll();}
});

// 초기 로드
loadAll();
</script>
